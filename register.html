<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2.0 - Cricket Betting Arena</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&family=Poppins:wght@300;400;600&display=swap');

        body {
            /* Cricket Stadium Dark Theme Background */
            background: linear-gradient(rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.9)), 
                        url('https://images.unsplash.com/photo-1531415074968-036ba1b575da?auto=format&fit=crop&q=80&w=2067');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .oswald { font-family: 'Oswald', sans-serif; }

        .ipl-card {
            background: rgba(30, 41, 59, 0.85);
            backdrop-filter: blur(12px);
            border-top: 4px solid #ef4444; /* Top Red Border for Sporty Look */
            border-bottom: 4px solid #22c55e; /* Bottom Green Border for Pitch feel */
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
        }

        /* Full Logo Box */
        .logo-box {
            width: 130px;
            height: 130px;
            margin: -75px auto 15px;
            background: #1e293b;
            border: 4px solid #fff;
            border-radius: 50%; /* Cricket Ball Shape */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.5);
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .input-field {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #475569;
            color: #fff;
            transition: all 0.3s ease;
        }

        .input-field:focus {
            border-color: #22c55e; /* Green focus like grass */
            box-shadow: 0 0 10px rgba(34, 197, 94, 0.3);
        }

        .btn-play {
            background: linear-gradient(135deg, #ef4444 0%, #b91c1c 100%);
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%); /* Sharp Sporty Edges */
        }

        .btn-play:hover {
            filter: brightness(1.2);
            transform: scale(1.02);
        }

        /* Live Indicator Effect */
        .live-dot {
            height: 8px;
            width: 8px;
            background-color: #ef4444;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="ipl-card p-8 relative">
    <div class="logo-box">
        <img src="logo.png" alt="IPL Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3504/3504113.png'">
    </div>

    <div class="text-center mb-6">
        <div class="flex justify-center items-center gap-2 mb-1">
            <span class="live-dot"></span>
            <span class="text-red-500 text-[10px] font-bold tracking-widest uppercase">Live Arena</span>
        </div>
        <h1 class="oswald text-4xl font-bold text-white tracking-tight italic">
            IPL <span class="text-red-500 underline decoration-green-500">2.0</span>
        </h1>
        <p class="text-slate-400 text-[11px] uppercase tracking-[0.2em] mt-1 font-medium">Join the Ultimate League</p>
    </div>

    <form id="signupForm" class="space-y-4">
        <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                <i class="fas fa-id-badge"></i>
            </span>
            <input type="email" id="email" required 
                class="input-field block w-full pl-11 pr-4 py-4 rounded-xl text-sm" 
                placeholder="User Email / Mobile">
        </div>

        <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                <i class="fas fa-lock"></i>
            </span>
            <input type="password" id="password" required 
                class="input-field block w-full pl-11 pr-4 py-4 rounded-xl text-sm" 
                placeholder="Security Password">
        </div>

        <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                <i class="fas fa-shield-alt"></i>
            </span>
            <input type="password" id="confirmPassword" required 
                class="input-field block w-full pl-11 pr-4 py-4 rounded-xl text-sm" 
                placeholder="Confirm Password">
        </div>

        <div class="relative">
            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-yellow-500">
                <i class="fas fa-trophy text-xs"></i>
            </span>
            <input type="text" id="referral" 
                class="input-field block w-full pl-11 pr-4 py-4 rounded-xl text-sm border-dashed border-yellow-600/50" 
                placeholder="Promo / Referral Code">
        </div>

        <div class="bg-black/20 p-3 rounded-lg border border-white/5">
            <div class="flex items-center space-x-3">
                <input type="checkbox" id="terms" required 
                    class="w-4 h-4 rounded border-slate-700 bg-slate-900 text-green-600 focus:ring-0">
                <label for="terms" class="text-[10px] text-slate-300">
                    I agree to the <b>Fair Play Policy</b> and confirm I am 18+ to enter this league.
                </label>
            </div>
        </div>

        <button type="submit" 
            class="btn-play w-full text-white font-bold py-4 rounded-lg mt-2 text-lg shadow-lg">
            Start Winning <i class="fas fa-bolt ml-2 text-yellow-400"></i>
        </button>
    </form>

    <div class="mt-6 text-center">
        <a href="login.html" class="text-slate-400 text-xs hover:text-white transition-all uppercase tracking-tighter">
            Already have a team? <span class="text-green-500 font-bold ml-1">Login Here</span>
        </a>
    </div>
</div>

<script type="module">
    // --- Firebase Logic (Same as your original) ---
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAj4SXI9ultqGO_AquyFbDj9bbUSuSoRqw",
        authDomain: "ipl2-f8488.firebaseapp.com",
        projectId: "ipl2-f8488",
        storageBucket: "ipl2-f8488.firebasestorage.app",
        messagingSenderId: "466468253752",
        appId: "1:466468253752:web:12e2cd94b69072506e76cd",
        measurementId: "G-V85QG85XYG"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const referral = document.getElementById('referral').value;

        if (password !== confirmPassword) {
            alert("⚠️ Match Failed: Passwords don't match!");
            return;
        }

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;
            await setDoc(doc(db, "users", user.uid), {
                email: email,
                referral: referral,
                role: "player",
                joinedAt: new Date().toISOString()
            });
            alert("✅ Welcome to the Arena! Your account is ready.");
            window.location.href = "login.html";
        } catch (error) {
            alert("❌ Error: " + error.message);
        }
    });
</script>

</body>
</html>
