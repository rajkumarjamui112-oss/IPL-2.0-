<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2.0 - Official Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

        body {
            background-color: #0f172a; /* Solid Professional Dark Blue */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .ipl-card {
            background: #1e293b; /* Solid surface color */
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3), 0 10px 10px -5px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 420px;
            position: relative;
        }

        /* Logo box updated to fit full image */
        .logo-box {
            width: 120px;
            height: 120px;
            margin: -60px auto 20px;
            background: #1e293b;
            border: 3px solid #ef4444;
            border-radius: 20px; /* Decent rounded corners */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* Taaki image box ke bahar na jaye */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
        }

        .logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Image ko box ke size mein full fit karega */
        }

        .input-group {
            position: relative;
        }

        .input-field {
            background: #0f172a;
            border: 1px solid #334155;
            color: #f8fafc;
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: #ef4444;
            outline: none;
            box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
        }

        .btn-register {
            background: #ef4444;
            transition: all 0.2s ease;
        }

        .btn-register:hover {
            background: #dc2626;
            transform: translateY(-1px);
        }

        .btn-register:active {
            transform: translateY(0);
        }

        /* Mobile Optimization */
        @media (max-width: 480px) {
            .ipl-card {
                margin-top: 60px;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>

<div class="ipl-card p-8 rounded-3xl">
    <div class="logo-box">
        <img src="logo.png" alt="IPL 2.0 Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5358/5358687.png'">
    </div>

    <div class="text-center mb-8">
        <h1 class="text-3xl font-extrabold text-white tracking-tight">
            IPL <span class="text-red-500">2.0</span>
        </h1>
        <p class="text-slate-400 text-xs uppercase tracking-widest mt-1 font-semibold">Registration Portal</p>
    </div>

    <form id="signupForm" class="space-y-4">
        <div class="input-group">
            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                <i class="fas fa-envelope text-sm"></i>
            </span>
            <input type="email" id="email" required 
                class="input-field block w-full pl-11 pr-4 py-3.5 rounded-xl text-sm" 
                placeholder="Email Address">
        </div>

        <div class="input-group">
            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                <i class="fas fa-lock text-sm"></i>
            </span>
            <input type="password" id="password" required 
                class="input-field block w-full pl-11 pr-4 py-3.5 rounded-xl text-sm" 
                placeholder="Create Password">
        </div>

        <div class="input-group">
            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                <i class="fas fa-shield-alt text-sm"></i>
            </span>
            <input type="password" id="confirmPassword" required 
                class="input-field block w-full pl-11 pr-4 py-3.5 rounded-xl text-sm" 
                placeholder="Confirm Password">
        </div>

        <div class="input-group">
            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-slate-500">
                <i class="fas fa-tag text-sm"></i>
            </span>
            <input type="text" id="referral" 
                class="input-field block w-full pl-11 pr-4 py-3.5 rounded-xl text-sm" 
                placeholder="Referral Code (Optional)">
        </div>

        <div class="flex items-start space-x-3 pt-2">
            <input type="checkbox" id="terms" required 
                class="mt-1 w-4 h-4 rounded border-slate-700 bg-slate-900 text-red-600 focus:ring-0">
            <label for="terms" class="text-[11px] text-slate-400">
                I agree to the <a href="#" class="text-red-500 hover:underline">IPL 2.0 Terms</a> and confirm I am 18 or older.
            </label>
        </div>

        <button type="submit" 
            class="btn-register w-full text-white font-bold py-4 rounded-xl mt-2 text-sm uppercase tracking-wider">
            Create Account
        </button>
    </form>

    <div class="mt-8 pt-6 border-t border-slate-700/50 text-center">
        <p class="text-slate-500 text-xs">Existing User?</p>
        <a href="login.html" class="text-white text-sm font-bold hover:text-red-500 transition-colors">
            Login to IPL 2.0
        </a>
    </div>
</div>

<script type="module">
    // Firebase Code Remains Same
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAj4SXI9ultqGO_AquyFbDj9bbUSuSoRqw",
        authDomain: "ipl2-f8488.firebaseapp.com",
        projectId: "ipl2-f8488",
        storageBucket: "ipl2-f8488.firebasestorage.app",
        messagingSenderId: "466468253752",
        appId: "1:466468253752:web:12e2cd94b69072506e76cd",
        measurementId: "G-V85QG85XYG"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const referral = document.getElementById('referral').value;

        if (password !== confirmPassword) {
            alert("⚠️ Passwords don't match!");
            return;
        }

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            await setDoc(doc(db, "users", user.uid), {
                email: email,
                referral: referral,
                role: "player",
                joinedAt: new Date().toISOString()
            });

            alert("✅ Registration successful for IPL 2.0!");
            window.location.href = "login.html";

        } catch (error) {
            console.error(error);
            alert("❌ Error: " + error.message);
        }
    });
</script>

</body>
</html>
