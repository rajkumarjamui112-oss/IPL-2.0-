<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2.0 - Professional Signup</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .ipl-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .input-field {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            transition: all 0.3s ease;
        }
        .input-field:focus {
            background: rgba(255, 255, 255, 0.15);
            border-color: #ef4444;
            outline: none;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>

<div class="ipl-card p-8 rounded-3xl w-full max-w-md mx-4">
    <div class="text-center mb-8">
        <div class="inline-block p-3 rounded-full bg-red-600 mb-4 shadow-lg shadow-red-500/50">
            <i class="fas fa-trophy text-2xl text-white"></i>
        </div>
        <h1 class="text-4xl font-extrabold text-white tracking-tighter">IPL <span class="text-red-500 text-5xl">2.0</span></h1>
        <p class="text-gray-400 mt-2 text-sm uppercase tracking-widest font-semibold">Create Your Account</p>
    </div>

    <form id="signupForm" class="space-y-5">
        <div>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i class="fas fa-envelope"></i>
                </span>
                <input type="email" id="email" required 
                    class="input-field block w-full pl-10 pr-3 py-3 rounded-xl text-sm" 
                    placeholder="Email Address">
            </div>
        </div>

        <div>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i class="fas fa-key"></i>
                </span>
                <input type="password" id="password" required 
                    class="input-field block w-full pl-10 pr-3 py-3 rounded-xl text-sm" 
                    placeholder="Create Password">
            </div>
        </div>

        <div>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i class="fas fa-shield-alt"></i>
                </span>
                <input type="password" id="confirmPassword" required 
                    class="input-field block w-full pl-10 pr-3 py-3 rounded-xl text-sm" 
                    placeholder="Confirm Password">
            </div>
        </div>

        <div>
            <div class="relative">
                <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-gray-400">
                    <i class="fas fa-ticket-alt"></i>
                </span>
                <input type="text" id="referral" 
                    class="input-field block w-full pl-10 pr-3 py-3 rounded-xl text-sm" 
                    placeholder="Referral Code (Optional)">
            </div>
        </div>

        <div class="flex items-center space-x-2 px-1">
            <input type="checkbox" id="terms" required 
                class="w-4 h-4 rounded border-gray-300 text-red-600 focus:ring-red-500 bg-transparent">
            <label for="terms" class="text-xs text-gray-400">
                I agree to the <a href="#" class="text-red-500 hover:underline">IPL 2.0 Terms & Conditions</a>
            </label>
        </div>

        <button type="submit" 
            class="w-full bg-gradient-to-r from-red-600 to-orange-500 hover:from-red-700 hover:to-orange-600 text-white font-bold py-3.5 rounded-xl transition-all duration-300 transform hover:-translate-y-1 shadow-xl active:scale-95">
            REGISTER NOW
        </button>
    </form>

    <div class="mt-8 text-center border-t border-white/10 pt-6">
        <p class="text-gray-400 text-sm italic">Already a member?</p>
        <a href="login.html" 
            class="mt-2 inline-block text-white font-bold border-b-2 border-red-500 pb-1 hover:text-red-500 transition-all">
            Login to Account
        </a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAj4SXI9ultqGO_AquyFbDj9bbUSuSoRqw",
        authDomain: "ipl2-f8488.firebaseapp.com",
        projectId: "ipl2-f8488",
        storageBucket: "ipl2-f8488.firebasestorage.app",
        messagingSenderId: "466468253752",
        appId: "1:466468253752:web:12e2cd94b69072506e76cd",
        measurementId: "G-V85QG85XYG"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const referral = document.getElementById('referral').value;

        if (password !== confirmPassword) {
            alert("⚠️ Passwords don't match!");
            return;
        }

        try {
            // Direct Email Registration
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            // Save user data to Firestore
            await setDoc(doc(db, "users", user.uid), {
                email: email,
                referral: referral,
                role: "player",
                joinedAt: new Date().toISOString()
            });

            alert("✅ Welcome to IPL 2.0! Signup successful.");
            window.location.href = "login.html";

        } catch (error) {
            console.error(error);
            alert("❌ Error: " + error.message);
        }
    });
</script>

</body>
</html>
