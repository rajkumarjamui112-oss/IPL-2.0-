<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2.0 - Deposit Money</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap');
        body { background-color: #050810; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 40px; display: flex; justify-content: center; }
        .bebas { font-family: 'Bebas Neue', sans-serif; }
        .mobile-view { width: 100%; max-width: 480px; background: #0a1122; min-height: 100vh; position: relative; }
        
        header {
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px);
            padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: sticky; top: 0; z-index: 100;
        }

        .pkg-card {
            background: #161d2f; border: 1px solid rgba(255,255,255,0.05);
            padding: 15px; border-radius: 15px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .pkg-card.active { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); transform: scale(1.05); }

        .qr-container {
            background: white; padding: 15px; border-radius: 15px; width: 200px; height: 200px;
            margin: 20px auto; display: flex; align-items: center; justify-content: center;
        }
        
        .btn-pay { background: linear-gradient(to right, #ef4444, #b91c1c); width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; margin-top: 20px; box-shadow: 0 4px 15px rgba(239, 68, 68, 0.3); }
        .input-utr { background: #050810; border: 1px solid #1e293b; padding: 12px; border-radius: 10px; width: 100%; color: white; outline: none; margin-top: 10px; }
    </style>
</head>
<body>

<div class="mobile-view">
    <header>
        <div class="flex items-center gap-3">
            <button onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
            <h1 class="bebas text-2xl">DEPOSIT <span class="text-red-500">FUNDS</span></h1>
        </div>
        <button onclick="location.href='deposit_history.html'"><i class="fas fa-history text-xl text-slate-400"></i></button>
    </header>

    <div class="p-5">
        <p class="text-xs text-slate-400 font-bold uppercase mb-4 tracking-widest">1. Select Deposit Amount</p>
        <div class="grid grid-cols-3 gap-3 mb-8">
            <div class="pkg-card active" onclick="selectPkg(this, 10)">
                <p class="text-[10px] text-slate-500 font-bold">STARTER</p>
                <p class="bebas text-xl">₹10</p>
            </div>
            <div class="pkg-card" onclick="selectPkg(this, 100)">
                <p class="text-[10px] text-slate-500 font-bold">PRO</p>
                <p class="bebas text-xl">₹100</p>
            </div>
            <div class="pkg-card" onclick="selectPkg(this, 500)">
                <p class="text-[10px] text-slate-500 font-bold">ELITE</p>
                <p class="bebas text-xl">₹500</p>
            </div>
        </div>

        <div class="bg-[#161d2f] rounded-3xl p-6 border border-white/5 text-center">
            <p class="text-xs text-slate-400 font-bold uppercase mb-4">2. Scan & Pay</p>
            
            <div class="qr-container">
                <img id="qrCode" src="" alt="QR Code">
            </div>

            <div class="flex items-center justify-between bg-black/40 p-3 rounded-xl border border-white/10 mb-4">
                <span class="text-[10px] font-mono text-slate-300" id="upiId">investpro4449@axl</span>
                <button onclick="copyUpi()" class="text-red-500 text-[10px] font-bold">COPY ID</button>
            </div>

            <button onclick="payNowIntent()" class="btn-pay">
                <i class="fas fa-mobile-alt mr-2"></i> PAY VIA UPI APPS
            </button>
        </div>

        <div class="mt-8 px-2">
            <p class="text-xs text-slate-400 font-bold uppercase mb-2 ml-1">3. Submit UTR / Ref No.</p>
            <input type="number" id="utrInput" class="input-utr" placeholder="Enter 12 Digit UTR Number">
            <button onclick="submitDeposit()" class="w-full bg-slate-800 py-4 rounded-xl mt-4 font-bold text-sm border border-white/10">SUBMIT TRANSACTION</button>
        </div>

        <p class="text-[10px] text-slate-500 text-center mt-10">
            <i class="fas fa-shield-alt text-green-500"></i> Your payment is 100% encrypted and secure.
        </p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAj4SXI9ultqGO_AquyFbDj9bbUSuSoRqw",
        authDomain: "ipl2-f8488.firebaseapp.com",
        projectId: "ipl2-f8488",
        storageBucket: "ipl2-f8488.firebasestorage.app",
        messagingSenderId: "466468253752",
        appId: "1:466468253752:web:12e2cd94b69072506e76cd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let selectedAmount = 10;
    const upi = "investpro4449@axl";
    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        if (user) currentUser = user;
        else window.location.href = "login.html";
    });

    // Function to generate QR
    function updateQR() {
        const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=upi://pay?pa=${upi}&pn=IPL2ARENA&am=${selectedAmount}&cu=INR`;
        document.getElementById('qrCode').src = qrUrl;
    }

    window.selectPkg = (element, amount) => {
        document.querySelectorAll('.pkg-card').forEach(card => card.classList.remove('active'));
        element.classList.add('active');
        selectedAmount = amount;
        updateQR();
    };

    window.copyUpi = () => {
        navigator.clipboard.writeText(upi);
        alert("UPI ID Copied!");
    };

    window.payNowIntent = () => {
        const intentUrl = `upi://pay?pa=${upi}&pn=IPL2ARENA&am=${selectedAmount}&cu=INR`;
        window.location.href = intentUrl;
    };

    window.submitDeposit = async () => {
        const utr = document.getElementById('utrInput').value;
        if(utr.length < 10) {
            alert("Please enter a valid 12-digit UTR number.");
            return;
        }

        try {
            await addDoc(collection(db, "deposits"), {
                userId: currentUser.uid,
                email: currentUser.email,
                amount: selectedAmount,
                utr: utr,
                status: "Pending",
                timestamp: serverTimestamp()
            });
            alert("Deposit submitted! Balance will be added after verification.");
            window.location.href = "home.html";
        } catch (e) {
            alert("Error: " + e.message);
        }
    };

    // Initial QR Load
    updateQR();
</script>

</body>
</html>
