<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2.0 - Secure Withdrawal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap');
        body { background-color: #050810; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 50px; display: flex; justify-content: center; }
        .bebas { font-family: 'Bebas Neue', sans-serif; }
        .mobile-view { width: 100%; max-width: 480px; background: #0a1122; min-height: 100vh; position: relative; }
        
        header {
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px);
            padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: sticky; top: 0; z-index: 100;
        }

        .card-panel { background: #161d2f; border: 1px solid rgba(255,255,255,0.05); padding: 20px; border-radius: 20px; margin-bottom: 20px; }
        .input-field { background: #050810; border: 1px solid #1e293b; padding: 12px; border-radius: 12px; width: 100%; color: white; margin-top: 8px; outline: none; transition: 0.3s; }
        .input-field:focus { border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.1); }
        
        .locked-badge { background: rgba(34, 197, 94, 0.1); color: #22c55e; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: bold; border: 1px solid rgba(34, 197, 94, 0.2); }
        .btn-main { width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .btn-withdraw { background: linear-gradient(to right, #ef4444, #991b1b); color: white; box-shadow: 0 5px 15px rgba(239, 68, 68, 0.3); }
        .btn-save { background: white; color: black; }
        
        .history-item { background: rgba(22, 29, 47, 0.5); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255, 255, 255, 0.03); display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div class="mobile-view">
    <header>
        <div class="flex items-center gap-3">
            <button onclick="history.back()"><i class="fas fa-arrow-left"></i></button>
            <h1 class="bebas text-2xl">WITHDRAWAL <span class="text-red-500">PORTAL</span></h1>
        </div>
        <div class="text-right">
            <p class="text-[8px] text-slate-500 font-bold uppercase">Balance</p>
            <p class="text-green-500 font-bold text-xs" id="headerBalance">₹ 0.00</p>
        </div>
    </header>

    <div class="p-4">
        <div id="setupMode" class="hidden">
            <div class="card-panel border-yellow-500/30 border">
                <h3 class="bebas text-xl text-yellow-500 mb-2 tracking-wide">SETUP PAYMENT METHOD</h3>
                <p class="text-[10px] text-slate-400 mb-6 font-medium uppercase tracking-tight italic">* Details once saved cannot be changed ever.</p>
                
                <p class="text-[10px] font-bold text-slate-500 uppercase">1. UPI Address</p>
                <input type="text" id="setupUpi" class="input-field mb-5" placeholder="example@upi">
                
                <p class="text-[10px] font-bold text-slate-500 uppercase">2. Bank Details (Optional)</p>
                <input type="text" id="setupBankName" class="input-field mb-2" placeholder="Account Holder Name">
                <input type="number" id="setupBankAcc" class="input-field mb-2" placeholder="Account Number">
                <input type="text" id="setupBankIfsc" class="input-field mb-6" placeholder="IFSC Code">
                
                <button onclick="saveDetailsToFirebase()" class="btn-main btn-save uppercase">Save Details Permanently</button>
            </div>
        </div>

        <div id="withdrawMode" class="hidden">
            <div class="card-panel">
                <div class="flex justify-between items-center mb-6">
                    <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Enter Amount</p>
                    <span class="locked-badge"><i class="fas fa-lock mr-1"></i> PAYOUT LOCKED</span>
                </div>
                
                <input type="number" id="withdrawAmt" class="w-full bg-transparent text-center text-4xl font-bold text-white mb-8 focus:outline-none" placeholder="₹ 0">
                
                <div class="p-4 bg-black/40 rounded-xl border border-white/5 mb-6">
                    <div class="flex justify-between mb-2">
                        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-tight">Active UPI:</span>
                        <span id="displayUpi" class="text-[10px] font-mono text-green-400 font-bold">---</span>
                    </div>
                    <div class="flex justify-between border-t border-white/5 pt-2">
                        <span class="text-[10px] text-slate-500 font-bold uppercase tracking-tight">Limit Today:</span>
                        <span id="dailyCountDisplay" class="text-[10px] text-white font-bold">0 / 2</span>
                    </div>
                </div>

                <button onclick="submitWithdrawal()" class="btn-main btn-withdraw uppercase tracking-widest">Request Payout</button>
            </div>
        </div>

        <div class="mt-8">
            <h3 class="bebas text-xl tracking-wider mb-4 px-1">PAYOUT <span class="text-red-500">HISTORY</span></h3>
            <div id="historyList">
                <p class="text-center text-xs text-slate-600 py-6">Checking status...</p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, collection, addDoc, query, where, orderBy, getDocs, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAj4SXI9ultqGO_AquyFbDj9bbUSuSoRqw",
        authDomain: "ipl2-f8488.firebaseapp.com",
        projectId: "ipl2-f8488",
        storageBucket: "ipl2-f8488.firebasestorage.app",
        messagingSenderId: "466468253752",
        appId: "1:466468253752:web:12e2cd94b69072506e76cd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let userBalance = 0;
    let userData = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loadUserCoreData();
            loadWithdrawalHistory();
        } else window.location.href = "login.html";
    });

    async function loadUserCoreData() {
        onSnapshot(doc(db, "users", currentUser.uid), (docSnap) => {
            if (docSnap.exists()) {
                userData = docSnap.data();
                userBalance = userData.balance || 0;
                document.getElementById('headerBalance').innerText = '₹ ' + userBalance.toFixed(2);
                
                // Logic: Details saved hain ya nahi?
                if (userData.payout_setup === true) {
                    document.getElementById('withdrawMode').classList.remove('hidden');
                    document.getElementById('setupMode').classList.add('hidden');
                    document.getElementById('displayUpi').innerText = userData.withdrawalUpi;
                } else {
                    document.getElementById('setupMode').classList.remove('hidden');
                    document.getElementById('withdrawMode').classList.add('hidden');
                }
            }
        });
        checkDailyLimit();
    }

    window.saveDetailsToFirebase = async () => {
        const upi = document.getElementById('setupUpi').value;
        if (!upi) return alert("Please enter at least UPI ID.");

        try {
            await updateDoc(doc(db, "users", currentUser.uid), {
                withdrawalUpi: upi,
                bankDetails: {
                    name: document.getElementById('setupBankName').value,
                    acc: document.getElementById('setupBankAcc').value,
                    ifsc: document.getElementById('setupBankIfsc').value
                },
                payout_setup: true
            });
            alert("Details Saved & Locked Successfully!");
        } catch (e) { alert(e.message); }
    };

    window.submitWithdrawal = async () => {
        const amt = parseFloat(document.getElementById('withdrawAmt').value);
        
        if (amt < 50) return alert("Minimum withdrawal ₹50");
        if (amt > userBalance) return alert("Insufficient funds!");
        
        // Final Daily Limit Check
        const count = await checkDailyLimit();
        if (count >= 2) return alert("Daily limit of 2 withdrawals reached!");

        try {
            // Subtract Balance
            await updateDoc(doc(db, "users", currentUser.uid), {
                balance: userBalance - amt
            });

            // Log Withdrawal
            await addDoc(collection(db, "withdrawals"), {
                userId: currentUser.uid,
                amount: amt,
                status: "Pending",
                timestamp: serverTimestamp(),
                upi: userData.withdrawalUpi
            });

            alert("Request Submitted Successfully!");
            document.getElementById('withdrawAmt').value = "";
        } catch (e) { alert(e.message); }
    };

    async function checkDailyLimit() {
        const startOfDay = new Date(); startOfDay.setHours(0,0,0,0);
        const q = query(collection(db, "withdrawals"), where("userId", "==", currentUser.uid), where("timestamp", ">=", startOfDay));
        const snap = await getDocs(q);
        document.getElementById('dailyCountDisplay').innerText = `${snap.size} / 2`;
        return snap.size;
    }

    function loadWithdrawalHistory() {
        const q = query(collection(db, "withdrawals"), where("userId", "==", currentUser.uid), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            let html = "";
            if (snap.empty) html = "<p class='text-center text-xs text-slate-600 italic py-6'>No payouts requested.</p>";
            snap.forEach(doc => {
                const d = doc.data();
                const color = d.status === "Pending" ? "text-yellow-500" : (d.status === "Success" ? "text-green-500" : "text-red-500");
                html += `
                    <div class="history-item">
                        <div>
                            <p class="text-sm font-bold tracking-wide">₹${d.amount}</p>
                            <p class="text-[8px] text-slate-500 font-bold uppercase tracking-widest">${new Date(d.timestamp?.toDate()).toLocaleString()}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-[9px] font-black ${color} uppercase tracking-widest">${d.status}</span>
                            <p class="text-[7px] text-slate-600 mt-1">Ref: ${doc.id.substring(0,8)}</p>
                        </div>
                    </div>`;
            });
            document.getElementById('historyList').innerHTML = html;
        });
    }
</script>

</body>
</html>
