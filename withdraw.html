<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2.0 - Withdrawal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap');
        body { background-color: #050810; color: white; font-family: 'Poppins', sans-serif; margin: 0; padding-bottom: 50px; display: flex; justify-content: center; }
        .bebas { font-family: 'Bebas Neue', sans-serif; }
        .mobile-view { width: 100%; max-width: 480px; background: #0a1122; min-height: 100vh; position: relative; }
        
        header {
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(12px);
            padding: 12px 20px; display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1); position: sticky; top: 0; z-index: 100;
        }

        .input-box { background: #161d2f; border: 1px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; width: 100%; color: white; outline: none; margin-top: 5px; transition: 0.3s; }
        .input-box:disabled { color: #64748b; background: #0f172a; border-color: rgba(34, 197, 94, 0.3); cursor: not-allowed; }

        .method-card {
            background: #161d2f; border: 1px solid rgba(255,255,255,0.05);
            padding: 15px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.3s; flex: 1;
        }
        .method-card.active { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); }

        .history-item {
            background: rgba(22, 29, 47, 0.5); border-radius: 12px; padding: 12px; margin-bottom: 10px; border: 1px solid rgba(255, 255, 255, 0.03);
        }
        .lock-icon { color: #22c55e; font-size: 10px; margin-left: 5px; display: none; }
        .is-locked .lock-icon { display: inline; }
    </style>
</head>
<body>

<div class="mobile-view">
    <header>
        <div class="flex items-center gap-3">
            <button onclick="location.href='wallet.html'"><i class="fas fa-arrow-left"></i></button>
            <h1 class="bebas text-2xl">WITHDRAW <span class="text-red-500">MONEY</span></h1>
        </div>
        <div class="text-right">
            <p class="text-[9px] text-slate-500 font-bold uppercase">Available</p>
            <p class="text-green-500 font-bold text-xs" id="headerBalance">₹ 0.00</p>
        </div>
    </header>

    <div class="p-4">
        <div class="bg-blue-500/10 border border-blue-500/20 p-3 rounded-xl mb-6 flex items-center gap-3">
            <i class="fas fa-info-circle text-blue-500"></i>
            <p class="text-[10px] text-blue-200">Daily Limit: <b>2 Withdrawals</b> | Min: <b>₹50</b></p>
        </div>

        <p class="text-[10px] text-slate-500 font-bold uppercase mb-2 tracking-widest">Enter Amount</p>
        <input type="number" id="withdrawAmount" class="input-box text-2xl font-bold mb-6" placeholder="₹ 0.00">

        <p class="text-[10px] text-slate-500 font-bold uppercase mb-3 tracking-widest">Select Method</p>
        <div class="flex gap-3 mb-6">
            <div class="method-card active" id="btnUpi" onclick="switchMethod('upi')">
                <i class="fas fa-mobile-alt mb-1"></i>
                <p class="text-[10px] font-bold">UPI ID</p>
            </div>
            <div class="method-card" id="btnBank" onclick="switchMethod('bank')">
                <i class="fas fa-university mb-1"></i>
                <p class="text-[10px] font-bold">BANK CARD</p>
            </div>
        </div>

        <div id="upiForm" class="method-group">
            <label class="text-[10px] text-slate-400 font-bold uppercase flex items-center">Your UPI ID <span class="lock-icon" id="upiLock"><i class="fas fa-lock"></i> Locked</span></label>
            <input type="text" id="upiIdInput" class="input-box mb-2" placeholder="Enter UPI ID (e.g. name@apl)">
            <p id="upiLockMsg" class="text-[9px] text-slate-500 mb-6 italic">* Once added, UPI ID cannot be changed.</p>
        </div>

        <div id="bankForm" class="method-group hidden">
            <label class="text-[10px] text-slate-400 font-bold uppercase flex items-center">Bank Details <span class="lock-icon" id="bankLock"><i class="fas fa-lock"></i> Locked</span></label>
            <input type="text" id="bankName" class="input-box mb-2" placeholder="Account Holder Name">
            <input type="number" id="accNumber" class="input-box mb-2" placeholder="Account Number">
            <input type="text" id="ifscCode" class="input-box mb-6" placeholder="IFSC Code">
        </div>

        <button onclick="requestWithdrawal()" id="withdrawBtn" class="w-full bg-red-600 py-4 rounded-xl font-bold text-sm shadow-lg shadow-red-900/30 active:scale-95 transition-transform">
            PROCEED WITHDRAWAL
        </button>

        <div class="mt-10">
            <div class="flex items-center justify-between mb-4 border-b border-white/5 pb-2">
                <h3 class="bebas text-xl tracking-wider">WITHDRAWAL <span class="text-red-500">HISTORY</span></h3>
                <i class="fas fa-history text-xs text-slate-500"></i>
            </div>
            <div id="historyList">
                <p class="text-center text-[10px] text-slate-600 py-4">Loading history...</p>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, collection, addDoc, updateDoc, query, where, orderBy, serverTimestamp, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAj4SXI9ultqGO_AquyFbDj9bbUSuSoRqw",
        authDomain: "ipl2-f8488.firebaseapp.com",
        projectId: "ipl2-f8488",
        storageBucket: "ipl2-f8488.firebasestorage.app",
        messagingSenderId: "466468253752",
        appId: "1:466468253752:web:12e2cd94b69072506e76cd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentMethod = 'upi';
    let currentUser = null;
    let userBalance = 0;
    let isUpiLocked = false;
    let isBankLocked = false;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            loadUserData(user.uid);
            loadHistory(user.uid);
        } else window.location.href = "login.html";
    });

    function loadUserData(uid) {
        onSnapshot(doc(db, "users", uid), (docSnap) => {
            if (docSnap.exists()) {
                const data = docSnap.data();
                userBalance = data.balance || 0;
                document.getElementById('headerBalance').innerText = '₹ ' + userBalance.toFixed(2);

                // Lock UPI if exists
                if (data.withdrawalUpi) {
                    isUpiLocked = true;
                    document.getElementById('upiIdInput').value = data.withdrawalUpi;
                    document.getElementById('upiIdInput').disabled = true;
                    document.getElementById('upiForm').classList.add('is-locked');
                    document.getElementById('upiLockMsg').innerText = "✅ UPI Details are permanently locked.";
                }

                // Lock Bank if exists
                if (data.bankDetails) {
                    isBankLocked = true;
                    document.getElementById('bankName').value = data.bankDetails.name;
                    document.getElementById('accNumber').value = data.bankDetails.acc;
                    document.getElementById('ifscCode').value = data.bankDetails.ifsc;
                    document.getElementById('bankName').disabled = true;
                    document.getElementById('accNumber').disabled = true;
                    document.getElementById('ifscCode').disabled = true;
                    document.getElementById('bankForm').classList.add('is-locked');
                }
            }
        });
    }

    window.switchMethod = (m) => {
        currentMethod = m;
        document.querySelectorAll('.method-card').forEach(c => c.classList.remove('active'));
        if(m === 'upi') {
            document.getElementById('btnUpi').classList.add('active');
            document.getElementById('upiForm').classList.remove('hidden');
            document.getElementById('bankForm').classList.add('hidden');
        } else {
            document.getElementById('btnBank').classList.add('active');
            document.getElementById('bankForm').classList.remove('hidden');
            document.getElementById('upiForm').classList.add('hidden');
        }
    }

    window.requestWithdrawal = async () => {
        const amount = parseFloat(document.getElementById('withdrawAmount').value);
        if (!amount || amount < 50) return alert("Minimum withdrawal is ₹50");
        if (amount > userBalance) return alert("Insufficient Balance!");

        // Daily Limit Check
        const startOfDay = new Date(); startOfDay.setHours(0,0,0,0);
        const q = query(collection(db, "withdrawals"), 
            where("userId", "==", currentUser.uid), 
            where("timestamp", ">=", startOfDay));
        const todayWithdrawals = await getDocs(q);
        if (todayWithdrawals.size >= 2) return alert("Daily limit reached! (2 per day)");

        const upiValue = document.getElementById('upiIdInput').value;
        const bName = document.getElementById('bankName').value;
        const bAcc = document.getElementById('accNumber').value;
        const bIfsc = document.getElementById('ifscCode').value;

        if (currentMethod === 'upi' && !upiValue) return alert("Enter UPI ID");
        if (currentMethod === 'bank' && (!bName || !bAcc || !bIfsc)) return alert("Fill all bank details");

        try {
            // Deduct Balance & Permanent Lock Logic
            const updateData = { balance: userBalance - amount };
            
            // Agar pehle se lock nahi hai, toh ab lock kar do
            if (!isUpiLocked && currentMethod === 'upi') updateData.withdrawalUpi = upiValue;
            if (!isBankLocked && currentMethod === 'bank') {
                updateData.bankDetails = { name: bName, acc: bAcc, ifsc: bIfsc };
            }

            await updateDoc(doc(db, "users", currentUser.uid), updateData);

            await addDoc(collection(db, "withdrawals"), {
                userId: currentUser.uid,
                amount: amount,
                method: currentMethod,
                details: currentMethod === 'upi' ? upiValue : { bName, bAcc, bIfsc },
                status: "Pending",
                timestamp: serverTimestamp()
            });

            alert("Withdrawal Successful! Details are now locked.");
            document.getElementById('withdrawAmount').value = "";
        } catch (e) { alert(e.message); }
    };

    function loadHistory(uid) {
        const q = query(collection(db, "withdrawals"), where("userId", "==", uid), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            let html = "";
            if (snapshot.empty) html = "<p class='text-center text-[10px] text-slate-600 py-4'>No transactions yet.</p>";
            snapshot.forEach((doc) => {
                const data = doc.data();
                const color = data.status === "Pending" ? "text-yellow-500" : (data.status === "Success" ? "text-green-500" : "text-red-500");
                html += `
                    <div class="history-item flex justify-between items-center">
                        <div>
                            <p class="text-[11px] font-bold">₹${data.amount}</p>
                            <p class="text-[8px] text-slate-500 uppercase">${data.method}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] font-bold ${color}">${data.status.toUpperCase()}</p>
                            <p class="text-[7px] text-slate-600">${data.timestamp ? new Date(data.timestamp.toDate()).toLocaleString() : 'Just now'}</p>
                        </div>
                    </div>`;
            });
            document.getElementById('historyList').innerHTML = html;
        });
    }
</script>
</body>
</html>
