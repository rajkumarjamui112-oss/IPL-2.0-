<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2.0 - Premium Registration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

        body {
            background: radial-gradient(circle at top, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            overflow-x: hidden;
        }

        /* Animated Background shapes for betting feel */
        .bg-shape {
            position: absolute;
            z-index: -1;
            filter: blur(80px);
            border-radius: 50%;
        }

        .ipl-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
            position: relative;
        }

        .logo-container {
            width: 100px;
            height: 100px;
            margin: -60px auto 20px;
            background: #1e293b;
            border: 4px solid #ef4444;
            padding: 10px;
            border-radius: 30px; /* Modern Squircle shape */
            box-shadow: 0 10px 20px rgba(239, 68, 68, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .logo-container img {
            max-width: 100%;
            height: auto;
            object-fit: contain;
        }

        .input-field {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field:focus {
            background: rgba(15, 23, 42, 0.9);
            border-color: #fbbf24; /* Gold border on focus */
            box-shadow: 0 0 15px rgba(251, 191, 36, 0.2);
            transform: translateX(5px);
        }

        .btn-premium {
            background: linear-gradient(90deg, #ef4444 0%, #b91c1c 100%);
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4);
        }

        .btn-premium:hover {
            filter: brightness(1.2);
            box-shadow: 0 6px 20px rgba(239, 68, 68, 0.6);
            transform: scale(1.02);
        }

        /* Custom Scrollbar for the form if needed */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #ef4444; border-radius: 10px; }
    </style>
</head>
<body>

<div class="bg-shape w-64 h-64 bg-red-900/20 top-10 left-10"></div>
<div class="bg-shape w-96 h-96 bg-blue-900/20 bottom-10 right-10"></div>

<div class="ipl-card p-8 pt-12 rounded-[2rem] w-full max-w-md mx-4 mt-12">
    
    <div class="logo-container">
        <img src="logo.png" alt="IPL Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5358/5358687.png'">
    </div>

    <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-white italic tracking-tighter">
            CRICKET<span class="text-red-500">BET</span> 2.0
        </h1>
        <div class="flex justify-center items-center gap-2 mt-1">
            <span class="h-[1px] w-8 bg-yellow-500"></span>
            <p class="text-yellow-500 text-[10px] uppercase font-bold tracking-[0.3em]">Official Partner</p>
            <span class="h-[1px] w-8 bg-yellow-500"></span>
        </div>
    </div>

    <form id="signupForm" class="space-y-4">
        <div class="relative group">
            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-500 group-focus-within:text-yellow-500 transition-colors">
                <i class="fas fa-user-ninja"></i>
            </span>
            <input type="email" id="email" required 
                class="input-field block w-full pl-12 pr-4 py-4 rounded-2xl text-sm" 
                placeholder="Username or Email">
        </div>

        <div class="relative group">
            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-500 group-focus-within:text-yellow-500 transition-colors">
                <i class="fas fa-lock"></i>
            </span>
            <input type="password" id="password" required 
                class="input-field block w-full pl-12 pr-4 py-4 rounded-2xl text-sm" 
                placeholder="Create Strong Password">
        </div>

        <div class="relative group">
            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-500 group-focus-within:text-yellow-500 transition-colors">
                <i class="fas fa-check-double"></i>
            </span>
            <input type="password" id="confirmPassword" required 
                class="input-field block w-full pl-12 pr-4 py-4 rounded-2xl text-sm" 
                placeholder="Confirm Password">
        </div>

        <div class="relative group">
            <span class="absolute inset-y-0 left-0 pl-4 flex items-center text-gray-500 group-focus-within:text-yellow-500 transition-colors">
                <i class="fas fa-gift"></i>
            </span>
            <input type="text" id="referral" 
                class="input-field block w-full pl-12 pr-4 py-4 rounded-2xl text-sm border-dashed" 
                placeholder="Referral Code (If any)">
        </div>

        <div class="flex items-center space-x-3 py-2">
            <input type="checkbox" id="terms" required 
                class="w-5 h-5 rounded border-gray-700 bg-slate-800 text-red-600 focus:ring-offset-slate-900">
            <label for="terms" class="text-[11px] text-gray-400 leading-tight">
                I confirm that I am 18+ and I agree to the <a href="#" class="text-red-400 hover:text-white underline">Privacy Policy</a>.
            </label>
        </div>

        <button type="submit" 
            class="btn-premium w-full text-white font-extrabold py-4 rounded-2xl mt-2 flex items-center justify-center gap-3">
            <span>Join the Arena</span>
            <i class="fas fa-arrow-right text-xs"></i>
        </button>
    </form>

    <div class="mt-8 text-center">
        <p class="text-gray-500 text-xs">Already have an account?</p>
        <a href="login.html" 
            class="mt-1 inline-block text-white text-sm font-semibold hover:text-yellow-500 transition-all underline underline-offset-4 decoration-red-500">
            Login Now
        </a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAj4SXI9ultqGO_AquyFbDj9bbUSuSoRqw",
        authDomain: "ipl2-f8488.firebaseapp.com",
        projectId: "ipl2-f8488",
        storageBucket: "ipl2-f8488.firebasestorage.app",
        messagingSenderId: "466468253752",
        appId: "1:466468253752:web:12e2cd94b69072506e76cd",
        measurementId: "G-V85QG85XYG"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        const referral = document.getElementById('referral').value;

        if (password !== confirmPassword) {
            alert("⚠️ Passwords don't match!");
            return;
        }

        try {
            const userCredential = await createUserWithEmailAndPassword(auth, email, password);
            const user = userCredential.user;

            await setDoc(doc(db, "users", user.uid), {
                email: email,
                referral: referral,
                role: "player",
                joinedAt: new Date().toISOString()
            });

            alert("✅ Welcome to the Arena! Registration successful.");
            window.location.href = "login.html";

        } catch (error) {
            console.error(error);
            alert("❌ Error: " + error.message);
        }
    });
</script>

</body>
</html>
