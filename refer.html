<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2.0 - Refer & Earn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap');

        body {
            background-color: #050810;
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding-bottom: 100px;
            display: flex;
            justify-content: center;
        }

        .bebas { font-family: 'Bebas Neue', sans-serif; }

        .mobile-view {
            width: 100%;
            max-width: 480px;
            background: #0a1122;
            min-height: 100vh;
            position: relative;
        }

        /* Header Style (Same as Home) */
        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            width: 45px; height: 45px; border-radius: 50%;
            border: 2px solid #ef4444; overflow: hidden;
            background: #fff; display: flex; align-items: center; justify-content: center;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* Refer Banner */
        .refer-banner {
            width: calc(100% - 30px);
            height: 160px;
            margin: 20px auto;
            border-radius: 20px;
            background: linear-gradient(45deg, #ef4444, #7c2d12);
            display: flex;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .refer-banner i {
            position: absolute;
            right: -20px;
            bottom: -20px;
            font-size: 120px;
            opacity: 0.2;
            transform: rotate(-15deg);
        }

        /* Scratch Card Style */
        .scratch-card {
            background: #161d2f;
            border: 2px dashed #ef4444;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin: 20px 15px;
        }

        /* Referral Code Box */
        .code-box {
            background: #050810;
            border: 1px solid #334155;
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
        }

        /* Bottom Nav (Same as Home) */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 480px;
            background: #0f172a; display: flex; justify-content: space-around;
            padding: 12px 0; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000;
        }
        .nav-item { text-align: center; color: #64748b; font-size: 11px; transition: 0.3s; }
        .nav-item.active { color: #ef4444; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="mobile-view">
    <header>
        <div class="flex items-center gap-3">
            <div class="logo-container">
                <img src="logo.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3504/3504113.png'">
            </div>
            <div>
                <h1 class="bebas text-2xl tracking-tight leading-none">REFER <span class="text-red-500">& EARN</span></h1>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-slate-500 font-bold">WALLET</p>
            <p class="text-green-500 font-bold text-sm" id="userBalance">₹ 0.00</p>
        </div>
    </header>

    <div class="refer-banner">
        <div>
            <h2 class="bebas text-3xl leading-none">INVITE FRIENDS</h2>
            <p class="text-[11px] mt-1 opacity-90 font-medium">Get a chance to win up to ₹199<br>on every successful referral.</p>
        </div>
        <i class="fas fa-gift"></i>
    </div>

    <div class="px-4">
        <p class="text-xs text-slate-400 font-bold uppercase mb-2 ml-1">Your Referral Code</p>
        <div class="code-box">
            <span id="referCode" class="bebas text-2xl tracking-widest text-white">LOADING...</span>
            <button onclick="copyCode()" class="bg-red-600 p-2 px-4 rounded-lg text-xs font-bold">COPY</button>
        </div>
    </div>

    <div class="scratch-card">
        <i class="fas fa-ticket-alt text-4xl text-yellow-500 mb-3"></i>
        <h3 class="bebas text-xl">LUCKY SCRATCH CARD</h3>
        <p class="text-[10px] text-slate-400 mb-6">Claim your referral bonus below</p>
        
        <div id="rewardDisplay" class="hidden mb-4">
            <p class="text-xs text-slate-400 uppercase">You Won</p>
            <p class="bebas text-5xl text-green-500">₹<span id="winAmount">0</span></p>
        </div>

        <button id="claimBtn" onclick="claimReward()" class="w-full bg-green-600 py-3 rounded-xl font-bold text-sm shadow-lg shadow-green-900/20">
            CLAIM REWARD
        </button>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="refer.html" class="nav-item active">
            <i class="fas fa-gift"></i>
            <span>Refer</span>
        </a>
        <a href="wallet.html" class="nav-item">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </a>
        <a href="account.html" class="nav-item">
            <i class="fas fa-user-circle"></i>
            <span>Account</span>
        </a>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, updateDoc, increment, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAj4SXI9ultqGO_AquyFbDj9bbUSuSoRqw",
        authDomain: "ipl2-f8488.firebaseapp.com",
        projectId: "ipl2-f8488",
        storageBucket: "ipl2-f8488.firebasestorage.app",
        messagingSenderId: "466468253752",
        appId: "1:466468253752:web:12e2cd94b69072506e76cd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUserId = null;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUserId = user.uid;
            // Fetch User Data
            const userRef = doc(db, "users", user.uid);
            
            // Real-time Balance
            onSnapshot(userRef, (doc) => {
                if (doc.exists()) {
                    document.getElementById('userBalance').innerText = '₹ ' + (doc.data().balance || 0).toFixed(2);
                    document.getElementById('referCode').innerText = doc.data().referral || 'NOCODE';
                }
            });
        } else {
            window.location.href = "login.html";
        }
    });

    // Copy Function
    window.copyCode = () => {
        const code = document.getElementById('referCode').innerText;
        navigator.clipboard.writeText(code);
        alert("Referral Code Copied: " + code);
    };

    // Scratch Card Logic (1 to 199 Random)
    window.claimReward = async () => {
        if(!currentUserId) return;

        const btn = document.getElementById('claimBtn');
        btn.disabled = true;
        btn.innerText = "SCRATCHING...";

        // Random Amount 1 to 199
        const randomReward = Math.floor(Math.random() * 199) + 1;

        try {
            const userRef = doc(db, "users", currentUserId);
            
            // Update Balance in Firebase
            await updateDoc(userRef, {
                balance: increment(randomReward)
            });

            // UI Update
            document.getElementById('rewardDisplay').classList.remove('hidden');
            document.getElementById('winAmount').innerText = randomReward;
            btn.innerText = "REWARD ADDED ✅";
            btn.classList.replace('bg-green-600', 'bg-slate-700');
            
            alert("Congratulations! You won ₹" + randomReward);
        } catch (error) {
            alert("Error claiming reward: " + error.message);
            btn.disabled = false;
            btn.innerText = "TRY AGAIN";
        }
    };
</script>

</body>
</html>
