<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2.0 - Refer & Earn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap');

        body {
            background-color: #050810;
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding-bottom: 100px;
            display: flex;
            justify-content: center;
        }

        .bebas { font-family: 'Bebas Neue', sans-serif; }

        .mobile-view {
            width: 100%;
            max-width: 480px;
            background: #0a1122;
            min-height: 100vh;
            position: relative;
        }

        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky; top: 0; z-index: 100;
        }

        .logo-container {
            width: 45px; height: 45px; border-radius: 50%;
            border: 2px solid #ef4444; overflow: hidden;
            background: #fff; display: flex; align-items: center; justify-content: center;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* Banner with refer.png */
        .refer-banner {
            width: calc(100% - 30px);
            height: 180px;
            margin: 20px auto;
            border-radius: 20px;
            background: url('refer.png'), linear-gradient(45deg, #1e293b, #0f172a);
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .stats-card {
            background: #161d2f;
            border-radius: 20px;
            padding: 20px;
            margin: 20px 15px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-box {
            background: #050810;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #1e293b;
        }

        .code-box {
            background: #050810;
            border: 1.5px dashed #ef4444;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0 15px;
        }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 480px;
            background: #0f172a; display: flex; justify-content: space-around;
            padding: 12px 0; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000;
        }
        .nav-item { text-align: center; color: #64748b; font-size: 11px; transition: 0.3s; }
        .nav-item.active { color: #ef4444; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="mobile-view">
    <header>
        <div class="flex items-center gap-3">
            <div class="logo-container">
                <img src="logo.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3504/3504113.png'">
            </div>
            <h1 class="bebas text-2xl tracking-tight leading-none">REFER <span class="text-red-500">& EARN</span></h1>
        </div>
        <div class="text-right">
            <p class="text-green-500 font-bold text-sm" id="userBalance">₹ 0.00</p>
        </div>
    </header>

    <div class="refer-banner"></div>

    <div class="mt-6">
        <p class="text-[10px] text-slate-500 font-bold uppercase mb-2 ml-5 tracking-widest">Share Your Code</p>
        <div class="code-box">
            <span id="referCode" class="bebas text-2xl tracking-[0.2em] text-white">GEN-CODE</span>
            <button onclick="copyCode()" class="bg-red-600 text-white p-2 px-5 rounded-lg text-[10px] font-bold shadow-lg shadow-red-900/40">COPY</button>
        </div>
    </div>

    <div class="stats-card">
        <div class="stat-box">
            <i class="fas fa-users text-blue-500 mb-2"></i>
            <p class="text-[9px] text-slate-500 font-bold uppercase">Total Refer</p>
            <p class="bebas text-2xl" id="totalRefer">5</p>
        </div>
        <div class="stat-box">
            <i class="fas fa-coins text-yellow-500 mb-2"></i>
            <p class="text-[9px] text-slate-500 font-bold uppercase">Total Earned</p>
            <p class="bebas text-2xl text-green-500">₹<span id="totalEarned">500</span></p>
        </div>
    </div>

    <div class="px-6 text-center">
        <p class="text-[11px] text-slate-400 font-medium leading-relaxed">
            Invite your friends to IPL 2.0 Arena and get <span class="text-red-500 font-bold">₹100</span> bonus for every successful registration!
        </p>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="refer.html" class="nav-item active"><i class="fas fa-gift"></i><span>Refer</span></a>
        <a href="wallet.html" class="nav-item"><i class="fas fa-wallet"></i><span>Wallet</span></a>
        <a href="account.html" class="nav-item"><i class="fas fa-user-circle"></i><span>Account</span></a>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAj4SXI9ultqGO_AquyFbDj9bbUSuSoRqw",
        authDomain: "ipl2-f8488.firebaseapp.com",
        projectId: "ipl2-f8488",
        storageBucket: "ipl2-f8488.firebasestorage.app",
        messagingSenderId: "466468253752",
        appId: "1:466468253752:web:12e2cd94b69072506e76cd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // Generate 6 letter code if not exists
            const shortCode = user.uid.substring(0, 6).toUpperCase();
            document.getElementById('referCode').innerText = shortCode;

            const userRef = doc(db, "users", user.uid);
            
            // Listen for Real-time Balance & Refer Stats
            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('userBalance').innerText = '₹ ' + (data.balance || 0).toFixed(2);
                    // Agar stats firestore mein hain toh waha se lo, warna default dikhao
                    document.getElementById('totalRefer').innerText = data.totalRefer || 5;
                    document.getElementById('totalEarned').innerText = data.totalEarned || 500;
                }
            });
        } else {
            window.location.href = "login.html";
        }
    });

    window.copyCode = () => {
        const code = document.getElementById('referCode').innerText;
        navigator.clipboard.writeText(code);
        alert("Referral Code Copied: " + code);
    };
</script>
</body>
</html>
