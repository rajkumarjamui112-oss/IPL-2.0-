<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2.0 - Refer & Earn</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap');

        body {
            background-color: #050810;
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding-bottom: 100px;
            display: flex;
            justify-content: center;
        }

        .bebas { font-family: 'Bebas Neue', sans-serif; }

        .mobile-view {
            width: 100%;
            max-width: 480px;
            background: #0a1122;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky; top: 0; z-index: 100;
        }

        .logo-container {
            width: 45px; height: 45px; border-radius: 50%;
            border: 2px solid #ef4444; overflow: hidden;
            background: #fff; display: flex; align-items: center; justify-content: center;
        }
        .logo-container img { width: 100%; height: 100%; object-fit: cover; }

        /* Refer Banner Image */
        .refer-banner {
            width: calc(100% - 30px);
            height: 180px;
            margin: 20px auto;
            border-radius: 20px;
            background: url('refer.png'), linear-gradient(45deg, #1e293b, #0f172a);
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .action-card {
            background: #161d2f;
            border-radius: 20px;
            padding: 20px;
            margin: 0 15px 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .code-display {
            background: #050810;
            border: 2px dashed #ef4444;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 15px;
        }

        .btn-copy { background: #3b82f6; color: white; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .btn-whatsapp { background: #25d366; color: white; width: 100%; padding: 12px; border-radius: 12px; font-weight: bold; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 10px; transition: 0.3s; }
        
        .btn-copy:active, .btn-whatsapp:active { transform: scale(0.98); }

        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; max-width: 480px;
            background: #0f172a; display: flex; justify-content: space-around;
            padding: 12px 0; border-top: 1px solid rgba(255, 255, 255, 0.05); z-index: 1000;
        }
        .nav-item { text-align: center; color: #64748b; font-size: 11px; text-decoration: none; transition: 0.3s; }
        .nav-item.active { color: #ef4444; }
        .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div class="mobile-view">
    <header>
        <div class="flex items-center gap-3">
            <div class="logo-container">
                <img src="logo.png" alt="Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3504/3504113.png'">
            </div>
            <h1 class="bebas text-2xl tracking-tight leading-none">REFER <span class="text-red-500">& EARN</span></h1>
        </div>
        <div class="text-right">
            <p class="text-green-500 font-bold text-sm" id="userBalance">₹ 0.00</p>
        </div>
    </header>

    <div class="refer-banner"></div>

    <div class="action-card">
        <p class="text-[10px] text-slate-500 font-bold uppercase mb-3 text-center tracking-widest">Share Your Referral Code</p>
        <div class="code-display">
            <span id="referCode" class="bebas text-3xl tracking-[0.3em] text-white">------</span>
        </div>
        
        <div class="flex flex-col">
            <button onclick="copyReferLink()" class="btn-copy">
                <i class="fas fa-copy"></i> COPY REFER LINK
            </button>
            <button onclick="shareWhatsApp()" class="btn-whatsapp">
                <i class="fab fa-whatsapp"></i> SHARE ON WHATSAPP
            </button>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 px-4 mb-6">
        <div class="bg-[#161d2f] p-4 rounded-2xl border border-white/5 text-center shadow-lg">
            <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Total Refer</p>
            <p class="bebas text-3xl text-white" id="totalRefer">0</p>
        </div>
        <div class="bg-[#161d2f] p-4 rounded-2xl border border-white/5 text-center shadow-lg">
            <p class="text-[9px] text-slate-500 font-bold uppercase mb-1">Total Earned</p>
            <p class="bebas text-3xl text-green-500">₹<span id="totalEarned">0</span></p>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="refer.html" class="nav-item active">
            <i class="fas fa-gift"></i>
            <span>Refer</span>
        </a>
        <a href="wallet.html" class="nav-item">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </a>
        <a href="account.html" class="nav-item">
            <i class="fas fa-user-circle"></i>
            <span>Account</span>
        </a>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAj4SXI9ultqGO_AquyFbDj9bbUSuSoRqw",
        authDomain: "ipl2-f8488.firebaseapp.com",
        projectId: "ipl2-f8488",
        storageBucket: "ipl2-f8488.firebasestorage.app",
        messagingSenderId: "466468253752",
        appId: "1:466468253752:web:12e2cd94b69072506e76cd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let myReferCode = "";

    onAuthStateChanged(auth, (user) => {
        if (user) {
            // Generate Code instantly from UID
            myReferCode = user.uid.substring(0, 6).toUpperCase();
            document.getElementById('referCode').innerText = myReferCode;

            // Listen for Real-time Balance, Total Refer, and Total Earned
            onSnapshot(doc(db, "users", user.uid), (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById('userBalance').innerText = '₹ ' + (data.balance || 0).toFixed(2);
                    document.getElementById('totalRefer').innerText = data.totalRefer || 0;
                    document.getElementById('totalEarned').innerText = data.totalEarned || 0;
                }
            });
        } else {
            window.location.href = "login.html";
        }
    });

    // Copy Refer Link
    window.copyReferLink = () => {
        const link = window.location.origin + "/register.html?ref=" + myReferCode;
        navigator.clipboard.writeText(link).then(() => {
            alert("Refer Link Copied Success!");
        });
    };

    // WhatsApp Share
    window.shareWhatsApp = () => {
        const link = window.location.origin + "/register.html?ref=" + myReferCode;
        const text = `🏏 *IPL 2.0 ARENA* 🏏\nJoin using my code: *${myReferCode}* and win big rewards daily!\nRegister now: ${link}`;
        window.open(`https://api.whatsapp.com/send?text=${encodeURIComponent(text)}`, '_blank');
    };
</script>

</body>
</html>
