\<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPL 2.0 - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600&display=swap');

        body {
            background-color: #050810; /* Deep Dark Theme */
            color: white;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding-bottom: 90px;
            display: flex;
            justify-content: center;
        }

        .bebas { font-family: 'Bebas Neue', sans-serif; }

        /* Mobile Container - Best for Phone & Desktop */
        .mobile-view {
            width: 100%;
            max-width: 480px;
            background: #0a1122;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        /* Header with Full Shape Logo */
        header {
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(12px);
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid #ef4444;
            overflow: hidden;
            background: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .logo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Logo fits perfectly */
        }

        /* Hero Banner - Attractive IPL Theme */
        .hero-section {
            padding: 15px;
        }

        .hero-banner {
            width: 100%;
            height: 180px;
            border-radius: 20px;
            background: linear-gradient(to right, rgba(10, 17, 34, 0.9), transparent), 
                        url('https://images.unsplash.com/photo-1540747913346-19e3adbb17c3?q=80&w=1000&auto=format&fit=crop'); 
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Match Cards */
        .match-card {
            background: #161d2f;
            border-radius: 18px;
            margin: 0 15px 20px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .bid-btn {
            background: transparent;
            border: 1.5px solid #ef4444;
            color: #ef4444;
            font-weight: 700;
            transition: 0.3s;
            padding: 10px;
            border-radius: 12px;
            font-size: 12px;
            flex: 1;
        }

        .bid-btn:hover {
            background: #ef4444;
            color: white;
        }

        /* Bottom Navigation Bar */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background: #0f172a;
            display: flex;
            justify-content: space-around;
            padding: 12px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }

        .nav-item {
            text-align: center;
            color: #64748b;
            text-decoration: none;
            font-size: 11px;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-item i {
            font-size: 22px;
            display: block;
            margin-bottom: 4px;
        }

        .nav-item.active {
            color: #ef4444;
        }
    </style>
</head>
<body>

<div class="mobile-view">
    <header>
        <div class="flex items-center gap-3">
            <div class="logo-container">
                <img src="logo.png" alt="IPL Logo" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3504/3504113.png'">
            </div>
            <div>
                <h1 class="bebas text-2xl tracking-tight leading-none">IPL <span class="text-red-500">2.0</span></h1>
                <p class="text-[9px] text-slate-500 font-bold tracking-widest uppercase">Official Arena</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-slate-500 font-bold">AVAILABLE</p>
            <p class="text-green-500 font-bold text-sm" id="userBalance">₹ 0.00</p>
        </div>
    </header>

    <div class="hero-section">
        <div class="hero-banner">
            <h2 class="bebas text-3xl leading-none text-white">TATA IPL 2024<br><span class="text-red-500">PREDICT & WIN</span></h2>
            <p class="text-[10px] text-slate-300 mt-2">Join India's most professional league.</p>
            <button onclick="location.href='wallet.html'" class="mt-4 bg-red-600 text-[10px] font-bold py-2 px-6 rounded-full w-max">RECHARGE NOW</button>
        </div>
    </div>

    <div class="px-4 mb-4 flex items-center justify-between">
        <h3 class="bebas text-xl text-slate-200 tracking-wide">Live Matches</h3>
        <span class="flex items-center gap-1 text-[10px] text-red-500 font-bold animate-pulse">
            <i class="fas fa-circle text-[8px]"></i> LIVE NOW
        </span>
    </div>

    <div class="match-card">
        <div class="flex justify-between items-center mb-6">
            <div class="text-center w-1/3">
                <img src="https://scores.iplt20.com/ipl-service/tms/download-image?fileId=100&folderName=Teams" class="w-12 h-12 mx-auto mb-2" alt="MI">
                <p class="text-xs font-bold tracking-tighter">MI</p>
            </div>
            <div class="text-center w-1/3">
                <p class="bebas text-2xl text-slate-700 italic">VS</p>
                <p class="text-[9px] bg-slate-800 text-yellow-500 py-1 px-2 rounded mt-2 font-bold uppercase">19:30 PM</p>
            </div>
            <div class="text-center w-1/3">
                <img src="https://scores.iplt20.com/ipl-service/tms/download-image?fileId=101&folderName=Teams" class="w-12 h-12 mx-auto mb-2" alt="CSK">
                <p class="text-xs font-bold tracking-tighter">CSK</p>
            </div>
        </div>
        <div class="flex gap-3">
            <button class="bid-btn">BACK MI (1.95)</button>
            <button class="bid-btn">BACK CSK (1.80)</button>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="home.html" class="nav-item active">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="refer.html" class="nav-item">
            <i class="fas fa-gift"></i>
            <span>Refer</span>
        </a>
        <a href="wallet.html" class="nav-item">
            <i class="fas fa-wallet"></i>
            <span>Wallet</span>
        </a>
        <a href="account.html" class="nav-item">
            <i class="fas fa-user-circle"></i>
            <span>Account</span>
        </a>
    </nav>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyAj4SXI9ultqGO_AquyFbDj9bbUSuSoRqw",
        authDomain: "ipl2-f8488.firebaseapp.com",
        projectId: "ipl2-f8488",
        storageBucket: "ipl2-f8488.firebasestorage.app",
        messagingSenderId: "466468253752",
        appId: "1:466468253752:web:12e2cd94b69072506e76cd"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onSnapshot(doc(db, "users", user.uid), (doc) => {
                if (doc.exists()) {
                    const balance = doc.data().balance || 0;
                    document.getElementById('userBalance').innerText = '₹ ' + parseFloat(balance).toFixed(2);
                }
            });
        } else {
            window.location.href = "login.html";
        }
    });
</script>

</body>
</html>
