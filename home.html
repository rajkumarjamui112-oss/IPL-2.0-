<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL 2.0 - Fantasy Matches</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;700&family=Poppins:wght@300;400;600&display=swap');
body{background:#0f172a;color:#fff;font-family:'Poppins',sans-serif;margin:0;padding-bottom:90px}
.oswald{font-family:'Oswald',sans-serif}
.match-card{background:linear-gradient(145deg,#1e293b,#0f172a);border:1px solid rgba(255,255,255,.05);border-radius:24px;padding:20px;margin-bottom:18px}
</style>
</head>
<body>
<header class="sticky top-0 z-50 bg-slate-800 border-b-2 border-red-500 px-5 py-4 flex justify-between items-center">
<div class="flex items-center gap-3">
<img src="logo.png" class="w-11 h-11 rounded-full border-2 border-red-500 object-cover" onerror="this.src='https://cdn-icons-png.flaticon.com/512/3504/3504113.png'">
<h1 class="oswald text-2xl">IPL <span class="text-red-500">2.0</span></h1>
</div>
<div class="text-right">
<p class="text-[10px] text-slate-400 uppercase">Balance</p>
<p id="userBalance" class="text-green-500 font-bold">₹ 0.00</p>
</div>
</header>
<main class="p-4">
<div class="bg-gradient-to-r from-red-600 to-orange-500 rounded-3xl p-6 mb-6">
<h2 class="oswald text-3xl">Fantasy Arena</h2>
<p class="text-sm opacity-90">Pick your match. Join contest. Build your team.</p>
</div>
<div class="flex justify-between items-center mb-4">
<h3 class="oswald text-xl">UPCOMING MATCHES</h3>
<span class="text-xs text-red-400">Live Firebase</span>
</div>
<div id="matchesContainer" class="space-y-4">
<p class="text-center text-slate-500 py-10">Loading matches...</p>
</div>
</main>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { getFirestore, doc, onSnapshot, collection, query, orderBy } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyAj4SXI9ultqGO_AquyFbDj9bbUSuSoRqw",authDomain:"ipl2-f8488.firebaseapp.com",projectId:"ipl2-f8488",storageBucket:"ipl2-f8488.firebasestorage.app",messagingSenderId:"466468253752",appId:"1:466468253752:web:12e2cd94b69072506e76cd"};
const app=initializeApp(firebaseConfig); const auth=getAuth(app); const db=getFirestore(app);
onAuthStateChanged(auth,(user)=>{
 if(!user){location.href='login.html';return;}
 onSnapshot(doc(db,'users',user.uid),(snap)=>{if(snap.exists()) document.getElementById('userBalance').innerText='₹ '+((snap.data().balance)||0).toFixed(2);});
 const q=query(collection(db,'matches'), orderBy('matchTime','asc'));
 onSnapshot(q,(snapshot)=>{
 const box=document.getElementById('matchesContainer');
 if(snapshot.empty){box.innerHTML='<p class="text-center text-slate-500">No matches added yet.</p>'; return;}
 let html='';
 snapshot.forEach((d)=>{
 const m=d.data();
 html += `<div class="match-card"><div class="flex justify-between mb-4"><span class="text-xs text-slate-400">${m.series||'IPL 2.0'}</span><span class="text-xs text-red-400 font-bold">${m.status||'UPCOMING'}</span></div><div class="flex justify-between items-center"><div class="text-center"><div class="w-14 h-14 bg-slate-800 rounded-full flex items-center justify-center font-bold mx-auto mb-2">${m.team1Short||'T1'}</div><p class="text-xs font-bold">${m.team1||''}</p></div><div class="text-center"><p class="oswald text-3xl text-red-500">VS</p><p class="text-[10px] text-slate-400 mt-2">${m.matchTime || ''}</p></div><div class="text-center"><div class="w-14 h-14 bg-slate-800 rounded-full flex items-center justify-center font-bold mx-auto mb-2">${m.team2Short||'T2'}</div><p class="text-xs font-bold">${m.team2||''}</p></div></div><button onclick="openContest('${d.id}')" class="w-full mt-5 bg-gradient-to-r from-red-600 to-orange-500 py-3 rounded-2xl font-bold">VIEW CONTESTS</button></div>`;
 });
 box.innerHTML=html;
 });
});
window.openContest=(matchId)=>{window.location.href=`contest.html?match=${matchId}`;}
</script>
</body>
</html>
